  <!-- Title -->
  <text x="60" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#e2e8f0">Beam or Be Left Behind: A Slovenian</text>
    <text x="60" y="206" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#e2e8f0">Plan to Skip Digital Transformation</text>
    <text x="60" y="252" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#e2e8f0">and Jump Straight Into AI</text>
    

  <!-- Description -->
  <text x="60" y="314" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8">A practical 24-month strategy for a small country that cannot</text>
    <text x="60" y="336" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8">afford another five-year roadmap. Put frontier agentic systems in</text>
    

  <!-- Bottom decorative line -->
  <line x1="60" y1="410" x2="350" y2="410" stroke="#1e293b" stroke-width="1"/>
