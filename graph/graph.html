const nodes = new vis.DataSet(nodesData.map(n => ({
  ...n,
  font: { color: '#e2e8f0', size: 12, face: 'SF Mono, Fira Code, monospace' },
  borderWidth: 2,
  borderWidthSelected: 3,
  color: {
    background: n.color + '20',
    border: n.color,
    highlight: { background: n.color + '40', border: n.color },
    hover: { background: n.color + '30', border: n.color },
  },
  shape: 'dot',
})));

const edges = new vis.DataSet(edgesData);

const container = document.getElementById('graph');
const network = new vis.Network(container, { nodes, edges }, {
  physics: {
    solver: 'forceAtlas2Based',
    forceAtlas2Based: {
      gravitationalConstant: -80,
      centralGravity: 0.01,
      springLength: 150,
      springConstant: 0.04,
      damping: 0.4,
    },
    stabilization: { iterations: 200 },
  },
  interaction: {
    hover: true,
    tooltipDelay: 200,
    navigationButtons: false,
    keyboard: true,
  },
  edges: {
    smooth: { type: 'continuous' },
    width: 1,
  },
});

// Click to navigate
network.on('doubleClick', function(params) {
  if (params.nodes.length > 0) {
    const nodeId = params.nodes[0];
    const node = nodesData.find(n => n.id === nodeId);
    if (node && node.url) {
      window.open(node.url, '_blank');
    }
  }
});

// Search
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', function() {
  const q = this.value.toLowerCase();
  if (!q) {
    nodes.forEach(n => nodes.update({ id: n.id, hidden: false }));
    return;
  }
  nodesData.forEach(n => {
    const match = n.label.toLowerCase().includes(q) ||
                  (n.tags || []).some(t => t.includes(q)) ||
                  (n.title || '').toLowerCase().includes(q);
    nodes.update({ id: n.id, hidden: !match });
  });
});

// Group toggle
const hiddenGroups = new Set();
function toggleGroup(group) {
  const el = document.querySelector(`.legend-item[data-group="${group}"]`);
  if (hiddenGroups.has(group)) {
    hiddenGroups.delete(group);
    el.classList.remove('dimmed');
  } else {
    hiddenGroups.add(group);
    el.classList.add('dimmed');
  }
  nodesData.forEach(n => {
    nodes.update({ id: n.id, hidden: hiddenGroups.has(n.group) });
  });
}
